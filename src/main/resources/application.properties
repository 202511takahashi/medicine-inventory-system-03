# アプリケーション名
spring.application.name=medicine-inventory

# JSP の参照先設定
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# 文字化け防止のための基本設定
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# --------------------------------------------------
# データベース設定
# 何も設定しない場合は、ローカル起動しやすいように H2 のファイルDBを使います。
# MySQL を使いたい場合は、下の環境変数を自分の値で上書きしてください。
#   SPRING_DATASOURCE_URL
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
#   SPRING_DATASOURCE_DRIVER_CLASS_NAME
#   SPRING_JPA_DATABASE_PLATFORM
#
# MySQL の例:
# set SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/medicine_inventory?useSSL=false&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8
# set SPRING_DATASOURCE_USERNAME=root
# set SPRING_DATASOURCE_PASSWORD=your_password
# set SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
# set SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect
# --------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/medicine_inventory;MODE=MySQL;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA / Hibernate 設定
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Tokyo
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 コンソール
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console